name: Deploy

on:
  push:
    branches: [master]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the hash
        id: get_hash
        run: |
          echo "HASH=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: "Get Previous tag"
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@master"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64/v8
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.previoustag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.previoustag.outputs.tag }}-${{ steps.get_hash.outputs.HASH }}
          build-args: |
            APP_VERSION=${{ steps.previoustag.outputs.tag }}-${{ steps.get_hash.outputs.HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key and config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << 'EOF'
          Host airssh.melinakrzemowa.pl
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Copy docker-compose.yml and deploy
        run: |
          VERSION=${{ steps.previoustag.outputs.tag }}-${{ steps.get_hash.outputs.HASH }}

          DEPLOY_DIR=/Users/${{ secrets.SSH_USERNAME }}/services/mooncraft.melinakrzemowa.pl
          SSH_TARGET=${{ secrets.SSH_USERNAME }}@airssh.melinakrzemowa.pl

          scp docker-compose.yml $SSH_TARGET:$DEPLOY_DIR/docker-compose.yml

          ssh $SSH_TARGET << DEPLOY
            set -e
            cd $DEPLOY_DIR
            docker pull ghcr.io/melinakrzemowa/mooncraft:${VERSION}
            VERSION=${VERSION} docker compose up -d
          DEPLOY
